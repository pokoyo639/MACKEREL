<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Miroslavny</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: #0a0a0a;
    --fg: #f5f5f0;
    --muted: #9a9a92;
    --line: rgba(245,245,240,0.18);
    --card: rgba(245,245,240,0.06);
    --accent: #f5f5f0;
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== ЧБ ФЛАГ НА ЗАДНЕМ ФОНЕ ===== */
  .flag-wrap{
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #050505;
  }

  .flag-wrap svg{
    position:absolute;
    top:50%; left:50%;
    width: 160%;
    max-width: 900px;
    transform: translate(-50%,-52%);
    opacity: 0.9;
  }

  .flag-cloth{
    animation: wave 6s ease-in-out infinite;
    transform-origin: left center;
  }

  @keyframes wave{
    0%,100%{ transform: skewY(0.5deg) scaleY(1); }
    50%{ transform: skewY(-0.5deg) scaleY(1.01); }
  }

  .flag-wrap::after{
    /* лёгкая виньетка, чтобы контент читался */
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(120% 90% at 50% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 75%, rgba(0,0,0,0.85) 100%);
  }

  /* ===== КОНТЕНТ ===== */
  .page{
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 40px;
  }

  .avatar{
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--fg);
    background: #1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 11px;
    color: var(--muted);
    text-align:center;
    letter-spacing:0.02em;
  }

  .name{
    margin-top: 18px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .name span{
    color: var(--muted);
    font-weight: 400;
    text-transform: none;
    display:block;
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .bio{
    margin-top: 16px;
    max-width: 420px;
    text-align: center;
    font-size: 15px;
    line-height: 1.5;
    color: #e6e6e0;
  }

  .divider{
    width: 40px;
    height: 1px;
    background: var(--line);
    margin: 28px 0;
  }

  .links{
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-item{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 14px 18px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--card);
    text-decoration:none;
    color: var(--fg);
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .link-item:active{
    background: rgba(245,245,240,0.14);
    transform: scale(0.98);
  }

  .link-title{
    display:flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-title b{
    font-size: 15px;
    font-weight: 600;
  }

  .link-title small{
    font-size: 12px;
    color: var(--muted);
  }

  .arrow{
    font-size: 16px;
    color: var(--muted);
  }

  .footer{
    margin-top: auto;
    padding-top: 40px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- ===== ЧБ ФЛАГ (SVG, генерируется кодом, без внешних картинок) ===== -->
  <div class="flag-wrap">
    <svg class="flag-cloth" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
      <!-- древко -->
      <rect x="40" y="20" width="8" height="360" fill="#f5f5f0" opacity="0.9"/>
      <!-- полотно флага -->
      <path d="M48,30
               C 200,10 260,60 340,35
               C 420,10 480,55 552,30
               L 552,300
               C 480,325 420,280 340,305
               C 260,330 200,280 48,300
               Z"
            fill="#111111" stroke="#f5f5f0" stroke-width="3"/>
      <!-- текст на флаге -->
      <text x="300" y="175" text-anchor="middle"
            font-family="Helvetica, Arial, sans-serif"
            font-size="54" font-weight="700"
            fill="#f5f5f0" letter-spacing="2">MIROSLAVNY</text>
    </svg>
  </div>

  <!-- ===== КОНТЕНТ ===== -->
  <div class="page">

    <!-- ФОТО: замени src на ссылку на своё фото -->
    <img class="avatar" id="avatar" src="" alt="photo"
         onerror="this.style.display='flex'; this.textContent='ФОТО';">

    <div class="name">
      Miroslavny
      <span>Telegram Mini App</span>
    </div>

    <!-- БИО: впиши свой текст сюда -->
    <div class="bio" id="bio">
      Здесь будет твоё био. Замени этот текст в HTML (id="bio") на пару предложений о себе.
    </div>

    <div class="divider"></div>

    <!-- ССЫЛКИ: добавляй/убирай блоки .link-item по образцу -->
    <div class="links" id="links">
      <a class="link-item" href="https://t.me/your_channel_1" target="_blank" rel="noopener">
        <div class="link-title">
          <b>Канал 1</b>
          <small>t.me/your_channel_1</small>
        </div>
        <div class="arrow">→</div>
      </a>

      <a class="link-item" href="https://t.me/your_channel_2" target="_blank" rel="noopener">
        <div class="link-title">
          <b>Канал 2</b>
          <small>t.me/your_channel_2</small>
        </div>
        <div class="arrow">→</div>
      </a>

      <!-- Скопируй блок выше, чтобы добавить ещё ссылку -->
    </div>

    <div class="footer">made with telegram mini apps</div>
  </div>

  <script>
    // Инициализация Telegram Web App
    (function(){
      try{
        const tg = window.Telegram && window.Telegram.WebApp;
        if(tg){
          tg.ready();
          tg.expand();
          // тёмная тема по умолчанию, но подстраиваем фон под клиент Telegram при желании:
          // document.body.style.background = tg.themeParams.bg_color || '#0a0a0a';
        }
      }catch(e){ console.warn('Telegram WebApp SDK не найден (ок для просмотра в браузере)', e); }
    })();
  </script>

</body>
</html>
